<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>生成中 - AI 职业形象照</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="./assets/css/system.css">
    <link rel="stylesheet" href="./assets/css/layout.css">
    <link rel="stylesheet" href="./assets/css/components.css">

    <style>
        body, html { height: 100%; margin: 0; }
        
        .loader-page {
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background-color: var(--color-surface-pure);
            text-align: center;
            padding: var(--space-24);
        }

        /* Progress Bar */
        .progress-container {
            width: 100%;
            max-width: 400px;
            height: 6px;
            background-color: var(--color-surface-elevated);
            border-radius: var(--radius-full);
            overflow: hidden;
            margin: var(--space-32) 0 var(--space-16);
            position: relative;
        }

        .progress-bar {
            height: 100%;
            background-color: var(--color-text-primary);
            width: 0%;
            transition: width 0.3s ease-out;
            border-radius: var(--radius-full);
        }

        .status-text {
            font-size: var(--text-body);
            color: var(--color-text-secondary);
            font-weight: var(--weight-medium);
            height: 24px; /* fixed height for rotation */
        }
        
        .time-text {
            font-size: var(--text-small);
            color: var(--color-text-tertiary);
            margin-top: var(--space-8);
        }

        /* Subtle pulsating glow for aesthetic */
        .pulse-core {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: linear-gradient(135deg, oklch(0.9 0.02 260), oklch(0.95 0.01 260));
            box-shadow: 0 0 0 0 rgba(0,0,0,0.05);
            animation: pulse 2s infinite cubic-bezier(0.66, 0, 0, 1);
            margin-bottom: var(--space-32);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
        }

        @keyframes pulse {
            to {
                box-shadow: 0 0 0 45px rgba(0,0,0,0);
            }
        }
        
        /* Bottom informational area */
        .footer-tips {
            position: absolute;
            bottom: var(--space-48);
            max-width: 600px;
            font-size: var(--text-small);
            color: var(--color-text-tertiary);
        }
    </style>
</head>
<body>

    <div class="loader-page">
        <!-- Visual Anchor -->
        <div class="pulse-core">✨</div>

        <h1 class="mb-sm" style="font-size: var(--text-h2);">正在注入灵魂...</h1>
        
        <div class="progress-container">
            <div class="progress-bar" id="progress-bar"></div>
        </div>

        <div class="status-text" id="status-text">初始化安全连接</div>
        <div class="time-text">预计还需要 2 分钟</div>

        <div class="footer-tips">
            <strong style="color: var(--color-text-secondary);">你知道吗？</strong><br>
            在这个过程中，系统并不是在给你的照片“换脸”，而是利用光影重建算法，在保持你绝对骨相和毛发分布的同时，重塑摄影棚级的打光和服装质感，从而达到 100% 像本人的专业效果。这符合我们的隐私透明度承诺。
        </div>
    </div>

    <script src="./assets/js/app.js"></script>
    <script>
        const statuses = [
            "正在将源照片上传至安全沙箱...",
            "提取面部骨相与多角度深度信息...",
            "应用商务求职摄影光影模板...",
            "环境色彩与发丝边缘融合渲染...",
            "进行输出前的高分辨率质检拦截...",
            "组装图像网格，即将完成！"
        ];
        
        const progressBar = document.getElementById('progress-bar');
        const statusText = document.getElementById('status-text');
        const timeText = document.querySelector('.time-text');
        
        let progress = 0;
        let pIndex = 0;
        const urlParams = new URLSearchParams(window.location.search);
        const currentJobId = urlParams.get("jobId") || sessionStorage.getItem("impeccable_current_job_id");
        let pollingTimer = null;

        document.addEventListener("DOMContentLoaded", async () => {
            try {
                await window.ImpeccableApp.requireAuth("login.html");
            } catch (_error) {
                return;
            }

            if (!currentJobId) {
                window.location.href = "dashboard.html";
                return;
            }

            sessionStorage.setItem("impeccable_current_job_id", currentJobId);
            await refreshJobState();
            pollingTimer = setInterval(refreshJobState, 1500);
        });

        async function refreshJobState() {
            try {
                const response = await window.ImpeccableApp.apiFetch("/api/jobs/" + encodeURIComponent(currentJobId));
                const job = response.job;
                const totalDuration = Math.max(1, job.previewReadyAt - job.createdAt);
                const elapsed = Math.max(0, Date.now() - job.createdAt);
                const computedProgress = Math.min(100, Math.round((elapsed / totalDuration) * 100));

                progress = Math.max(progress, computedProgress);
                progressBar.style.width = progress + "%";

                const newIndex = Math.min(statuses.length - 1, Math.floor((progress / 100) * statuses.length));
                if (newIndex !== pIndex) {
                    pIndex = newIndex;
                    statusText.innerText = statuses[pIndex];
                }

                timeText.innerText = job.secondsRemaining > 0 ? "预计还需要 " + job.secondsRemaining + " 秒" : "正在整理结果...";

                if (job.status === "preview" || job.status === "unlocked") {
                    clearInterval(pollingTimer);
                    progress = 100;
                    progressBar.style.width = "100%";
                    statusText.innerText = "结果已完成，正在进入样片页...";
                    setTimeout(() => {
                        window.location.href = "result.html?batchId=" + encodeURIComponent(currentJobId);
                    }, 500);
                }
            } catch (error) {
                statusText.innerText = error.message || "获取任务进度失败";
            }
        }
    </script>
</body>
</html>
