<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>联系客服 - Auralis 曜临</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./assets/css/system.css">
    <link rel="stylesheet" href="./assets/css/layout.css">
    <link rel="stylesheet" href="./assets/css/components.css">
    <style>
        body { background: radial-gradient(circle at top left, #eef8ff 0, transparent 32%), linear-gradient(180deg, #fff 0%, #f6f7f9 100%); }
        .support-shell { max-width: 1040px; margin: var(--space-48) auto; display: grid; grid-template-columns: 320px 1fr; gap: var(--space-24); }
        .support-card, .chat-card { background: rgba(255,255,255,.88); border: 1px solid var(--color-border-subtle); border-radius: var(--radius-xl); box-shadow: var(--shadow-sm); backdrop-filter: blur(18px); }
        .support-card { padding: var(--space-24); align-self: start; }
        .chat-card { display: grid; grid-template-rows: auto 1fr auto; min-height: 640px; overflow: hidden; }
        .chat-header { padding: var(--space-24); border-bottom: 1px solid var(--color-border-subtle); }
        .message-list { padding: var(--space-24); overflow-y: auto; display: flex; flex-direction: column; gap: var(--space-12); }
        .message { max-width: 78%; padding: var(--space-12) var(--space-16); border-radius: 18px; font-size: var(--text-small); line-height: 1.65; }
        .message.user { align-self: flex-end; background: #111; color: #fff; border-bottom-right-radius: 4px; }
        .message.admin { align-self: flex-start; background: var(--color-surface-subtle); color: var(--color-text-primary); border-bottom-left-radius: 4px; }
        .composer { padding: var(--space-16); display: flex; gap: var(--space-12); border-top: 1px solid var(--color-border-subtle); background: #fff; }
        .composer input { flex: 1; border: 1px solid var(--color-border-subtle); border-radius: var(--radius-full); padding: 0 var(--space-16); min-height: 46px; }
        .status-dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; background: var(--color-status-success); margin-right: 8px; }
        @media (max-width: 820px) { .support-shell { grid-template-columns: 1fr; margin: var(--space-16); } .chat-card { min-height: 560px; } }
    </style>
</head>
<body>
    <nav class="header-sticky" style="height: 64px; display: flex; align-items: center; border-bottom: 1px solid var(--color-border-subtle);">
        <div class="container flex-row justify-between w-100" style="width: 100%;">
            <a href="dashboard.html" style="font-weight: var(--weight-semibold); font-size: 1.1rem; color: var(--color-text-primary); text-decoration: none;">Auralis<span style="color:var(--color-text-secondary); margin-left: 6px; font-size: .82em; letter-spacing: .08em;">曜临</span></a>
            <a href="dashboard.html" class="btn btn-ghost">返回控制台</a>
        </div>
    </nav>

    <main class="support-shell">
        <aside class="support-card">
            <div class="badge badge-success mb-sm"><span class="status-dot"></span>人工客服通道</div>
            <h1 style="font-size: var(--text-h2); margin-bottom: var(--space-12);">把问题直接发给管理员</h1>
            <p style="color: var(--color-text-secondary); margin-bottom: var(--space-24);">这里不是表单提交，而是站内对话。用户发送后，管理员会在运营指挥中心看到并回复。</p>
            <div style="display: grid; gap: var(--space-12); color: var(--color-text-secondary); font-size: var(--text-small);">
                <div>建议包含：订单批次号、遇到的问题、你期望的结果。</div>
                <div>支付问题：请说明支付时间、金额和截图信息。</div>
                <div>生成问题：请说明哪一张图不满意以及原因。</div>
            </div>
        </aside>

        <section class="chat-card">
            <div class="chat-header">
                <div style="font-size: var(--text-small); color: var(--color-text-tertiary);">当前会话</div>
                <h2 style="font-size: var(--text-h3); margin: 0;">Auralis 客服</h2>
            </div>
            <div class="message-list" id="message-list"></div>
            <div class="composer">
                <input id="message-input" maxlength="500" placeholder="输入你的问题，例如：我刚刚支付了但积分没到账。" onkeydown="handleComposerKey(event)">
                <button class="btn btn-primary" id="send-btn" onclick="sendMessage()">发送</button>
            </div>
        </section>
    </main>

    <script src="./assets/js/app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            try {
                await window.ImpeccableApp.requireAuth('login.html');
                await loadMessages();
                setInterval(loadMessages, 5000);
            } catch (_error) {
                // Redirect handled in helper.
            }
        });

        function renderMessages(messages) {
            const list = document.getElementById('message-list');
            if (!messages.length) {
                list.innerHTML = '<div class="message admin">你好，我是 Auralis 客服。请直接描述你的问题，管理员会在后台回复。</div>';
                return;
            }
            list.innerHTML = messages.map((message) => {
                const cls = message.isAdmin ? 'admin' : 'user';
                return `<div class="message ${cls}">${escapeHtml(message.content)}</div>`;
            }).join('');
            list.scrollTop = list.scrollHeight;
        }

        async function loadMessages() {
            const response = await window.ImpeccableApp.apiFetch('/api/chat');
            renderMessages(response.messages || []);
        }

        async function sendMessage() {
            const input = document.getElementById('message-input');
            const content = input.value.trim();
            if (!content) return;
            document.getElementById('send-btn').disabled = true;
            try {
                await window.ImpeccableApp.apiFetch('/api/chat', {
                    method: 'POST',
                    body: JSON.stringify({ content })
                });
                input.value = '';
                await loadMessages();
            } finally {
                document.getElementById('send-btn').disabled = false;
                input.focus();
            }
        }

        function handleComposerKey(event) {
            if (event.key === 'Enter') sendMessage();
        }

        function escapeHtml(value) {
            return String(value).replace(/[&<>'"]/g, (char) => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;' }[char]));
        }
    </script>
</body>
</html>
